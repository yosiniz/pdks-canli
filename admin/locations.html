<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDKS - Lokasyonlar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css?v=5">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- DARK THEME CRITICAL OVERRIDES -->
  <style>
    html, body { background: #0d1117 !important; color: #e6edf3 !important; color-scheme: dark !important; }
    .app-layout, .main-content { background: #0d1117 !important; }
    .card, .card-body { background: #161b22 !important; }
    .card-header { background: #161b22 !important; border-bottom: 1px solid #30363d !important; }
    .card-header h3 { color: #e6edf3 !important; }
    thead th { background: #0d1117 !important; color: #8b949e !important; border-bottom: 1px solid #30363d !important; }
    tbody td { background: #161b22 !important; color: #e6edf3 !important; border-bottom: 1px solid #30363d !important; }
    tbody tr:hover td { background: #1f2937 !important; }
    input, select, textarea { background: #0d1117 !important; color: #e6edf3 !important; border: 1px solid #30363d !important; color-scheme: dark !important; }
    input:focus, select:focus { background: #161b22 !important; border-color: #f97316 !important; }
    option { background: #161b22 !important; color: #e6edf3 !important; }
    .stat-card { background: #161b22 !important; border: 1px solid #30363d !important; }
    .filter-bar input, .filter-bar select { background: #161b22 !important; color: #e6edf3 !important; }
    label { color: #8b949e !important; }
    ::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.6) !important; }
  </style></head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><h2>PDKS</h2><small>Yönetim Paneli</small></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Dashboard</span></a>
        <a href="personnel.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Personel</span></a>
        <a href="locations.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>Lokasyonlar</span></a>
        <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg><span>Raporlar</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info"><div class="user-avatar">A</div><div><div class="name">Admin</div><div class="role">Yönetici</div></div></div>
        <button class="btn btn-secondary btn-full btn-logout" onclick="logout()">Çıkış Yap</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div><h1>Lokasyon Yönetimi</h1><p>Çalışma lokasyonlarını ve QR kodlarını yönetin</p></div>
        <button class="btn btn-primary" onclick="showAddLocation()">+ Yeni Lokasyon</button>
      </div>
      <div class="stats-grid" id="locations-grid">
        <div style="text-align:center;color:var(--text-muted);padding:40px;">Yükleniyor...</div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Location Modal -->
  <div id="loc-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header"><h3 id="loc-modal-title">Yeni Lokasyon</h3><button class="close-btn" onclick="closeLocModal()">×</button></div>
      <div class="modal-body">
        <input type="hidden" id="loc-edit-id">
        <div class="form-group"><label>Lokasyon Adı *</label><input type="text" id="loc-name" placeholder="Merkez Ofis"></div>
        <div class="form-group"><label>Adres</label><input type="text" id="loc-address" placeholder="İstanbul, Türkiye"></div>
        <div class="form-row">
          <div class="form-group"><label>Enlem (Latitude) *</label><input type="number" step="any" id="loc-lat" placeholder="41.0082"></div>
          <div class="form-group"><label>Boylam (Longitude) *</label><input type="number" step="any" id="loc-lng" placeholder="28.9784"></div>
        </div>
        <div class="form-group" style="margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
          <label style="margin-bottom:0;">Harita Üzerinden Seç</label>
          <button class="btn btn-sm btn-secondary" onclick="useCurrentLocation()" style="padding:4px 8px; font-size:11px;">📍 Şu Anki Konumumu Al</button>
        </div>
        <div class="map-help">💡 Haritaya tıklayarak veya pini sürükleyerek konum seçebilirsiniz.</div>
        <div class="map-container">
          <div id="loc-map"></div>
        </div>
        <div class="form-group"><label>GPS Toleransı (metre)</label><input type="number" id="loc-radius" value="50" min="10" max="500" oninput="updateMapCircle()"></div>
        <div class="form-row" style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; flex-wrap: wrap;">
          <h4 style="width:100%; margin-bottom:10px; color: var(--text-secondary); font-size:12px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600;">Ücretlendirme ve Mesai</h4>
          <div class="form-group" style="flex: 1;"><label>Part-Time Saatlik Ücret (₺)</label><input type="number" step="any" id="loc-hourly" value="0"></div>
          <div class="form-group" style="flex: 1;"><label>Part-Time Yol Ücreti (₺)</label><input type="number" step="any" id="loc-travel" value="0"></div>
          <div class="form-group" style="flex: 1;"><label>Part-Time Yemek Ücreti (₺)</label><input type="number" step="any" id="loc-food" value="0"></div>
          <div class="form-group" style="flex: 1;"><label>Kadrolu Mesai Çarpanı</label><input type="number" step="any" id="loc-multiplier" value="1" title="Fazla mesai yapıldığında saatlik ücretin kaç ile çarpılacağını belirler. (Örn: 1.5 veya 2)"></div>
        </div>
        <div class="form-group" style="flex-direction:row; align-items:center; gap:8px;">
          <input type="checkbox" id="loc-active" checked style="width:auto; margin:0;">
          <label for="loc-active" style="margin:0;">Aktif Lokasyon (Personeller kullanabilir)</label>
        </div>
        <div id="loc-error" class="alert alert-danger" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeLocModal()">İptal</button>
        <button class="btn btn-primary" onclick="saveLocation()">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- QR Modal -->
  <div id="qr-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header"><h3 id="qr-title">QR Kod</h3><button class="close-btn" onclick="closeQRModal()">×</button></div>
      <div class="modal-body">
        <div class="qr-display">
          <img id="qr-image" alt="QR Kod">
          <div class="qr-label" id="qr-label"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="printQR()">🖨️ Yazdır</button>
        <button class="btn btn-primary" onclick="closeQRModal()">Kapat</button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('pdks_admin_token');
    if (!TOKEN) window.location.href = 'login.html';

    async function apiFetch(url, opts) {
      try {
        const headers = { 'Authorization':'Bearer '+TOKEN };
        if (opts && opts.body && typeof opts.body === 'string') headers['Content-Type'] = 'application/json';
        const res = await fetch(url, { headers, ...opts });
        if (res.status===401) { logout(); return null; }
        if (!res.ok) {
          const errData = await res.json().catch(() => ({ error: 'Sunucu hatası: ' + res.status }));
          throw new Error(errData.error || 'İstek başarısız oldu');
        }
        return await res.json();
      } catch (err) {
        console.error('API Fetch Hatası:', err);
        throw err;
      }
    }

    async function loadLocations() {
      const grid = document.getElementById('locations-grid');
      try {
        const data = await apiFetch('/api/admin/locations');
        if (!data) return;
        
        if (!data.locations || data.locations.length === 0) {
          grid.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:60px;grid-column:1/-1;"><p>Henüz lokasyon eklenmemiş</p><p style="margin-top:8px;">Yukarıdaki "Yeni Lokasyon" butonuna tıklayın</p></div>';
          return;
        }
        grid.innerHTML = data.locations.map(l => {
          const statusBadge = l.is_active ? '<span class="badge badge-success">Aktif</span>' : '<span class="badge badge-danger">Pasif</span>';
          return '<div class="stat-card" style="flex-direction:column;align-items:flex-start;gap:12px;cursor:default;">' +
            '<div style="display:flex;justify-content:space-between;width:100%;align-items:center;">' +
              '<div style="font-size:16px;font-weight:600;">'+l.name+'</div>' + statusBadge +
            '</div>' +
            '<div style="font-size:12px;color:var(--text-secondary);">📍 '+(l.address||'Adres belirtilmemiş')+'</div>' +
            '<div style="font-size:12px;color:var(--text-muted);">Koordinat: '+l.latitude.toFixed(4)+', '+l.longitude.toFixed(4)+' • Yarıçap: '+l.radius_meters+'m</div>' +
            '<div style="display:flex;gap:8px;width:100%;margin-top:4px;">' +
              '<button class="btn btn-sm btn-primary" onclick="showQR('+l.id+')">QR Göster</button>' +
              '<button class="btn btn-sm btn-secondary" onclick="regenerateQR('+l.id+')">QR Yenile</button>' +
              '<button class="btn btn-sm btn-secondary" onclick="editLocation('+l.id+')">Düzenle</button>' +
            '</div>' +
          '</div>';
        }).join('');
      } catch (err) {
        grid.innerHTML = '<div style="text-align:center;color:#ef4444;padding:60px;grid-column:1/-1;"><p>Veriler yüklenirken hata oluştu</p><p style="margin-top:8px;font-size:12px;opacity:0.8;">' + err.message + '</p></div>';
      }
    }

    let map, mapMarker, mapCircle;
    const DEFAULT_COORD = [41.0082, 28.9784];

    function initMap() {
      if (map) return;
      map = L.map('loc-map').setView(DEFAULT_COORD, 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);

      map.on('click', (e) => {
        const { lat, lng } = e.latlng;
        setMapPosition(lat, lng);
      });
    }

    function setMapPosition(lat, lng, zoom = 15) {
      const radius = parseInt(document.getElementById('loc-radius').value) || 50;
      document.getElementById('loc-lat').value = lat.toFixed(6);
      document.getElementById('loc-lng').value = lng.toFixed(6);

      if (!mapMarker) {
        mapMarker = L.marker([lat, lng], { draggable: true }).addTo(map);
        mapCircle = L.circle([lat, lng], { radius, color: '#FF6B00', fillOpacity: 0.2 }).addTo(map);

        mapMarker.on('dragend', () => {
          const pos = mapMarker.getLatLng();
          setMapPosition(pos.lat, pos.lng);
        });
      } else {
        mapMarker.setLatLng([lat, lng]);
        mapCircle.setLatLng([lat, lng]);
        mapCircle.setRadius(radius);
      }
      map.setView([lat, lng], zoom);
    }

    function updateMapCircle() {
      const radius = parseInt(document.getElementById('loc-radius').value) || 50;
      if (mapCircle) mapCircle.setRadius(radius);
    }

    function useCurrentLocation() {
      if (!navigator.geolocation) return alert('GPS desteği bulunamadı');
      navigator.geolocation.getCurrentPosition((pos) => {
        setMapPosition(pos.coords.latitude, pos.coords.longitude);
      }, (err) => alert('Konum alınamadı: ' + err.message));
    }

    async function showAddLocation() {
      document.getElementById('loc-modal-title').textContent = 'Yeni Lokasyon';
      document.getElementById('loc-edit-id').value = '';
      document.getElementById('loc-name').value = '';
      document.getElementById('loc-address').value = '';
      document.getElementById('loc-lat').value = '';
      document.getElementById('loc-lng').value = '';
      document.getElementById('loc-radius').value = '50';
      document.getElementById('loc-hourly').value = '0';
      document.getElementById('loc-travel').value = '0';
      document.getElementById('loc-food').value = '0';
      document.getElementById('loc-multiplier').value = '1';
      document.getElementById('loc-active').checked = true;
      document.getElementById('loc-error').style.display = 'none';
      document.getElementById('loc-modal').style.display = 'flex';
      
      setTimeout(() => {
        initMap();
        map.invalidateSize();
        setMapPosition(DEFAULT_COORD[0], DEFAULT_COORD[1], 10);
      }, 100);
    }

    async function editLocation(id) {
      const data = await apiFetch('/api/admin/locations');
      const l = data.locations.find(x => x.id === id);
      if (!l) return;
      document.getElementById('loc-modal-title').textContent = 'Lokasyon Düzenle';
      document.getElementById('loc-edit-id').value = l.id;
      document.getElementById('loc-name').value = l.name;
      document.getElementById('loc-address').value = l.address || '';
      document.getElementById('loc-lat').value = l.latitude;
      document.getElementById('loc-lng').value = l.longitude;
      document.getElementById('loc-radius').value = l.radius_meters;
      document.getElementById('loc-hourly').value = l.hourly_rate || 0;
      document.getElementById('loc-travel').value = l.travel_allowance || 0;
      document.getElementById('loc-food').value = l.food_allowance || 0;
      document.getElementById('loc-multiplier').value = l.overtime_multiplier || 1;
      document.getElementById('loc-active').checked = l.is_active === 1 || l.is_active === true;
      document.getElementById('loc-error').style.display = 'none';
      document.getElementById('loc-modal').style.display = 'flex';

      setTimeout(() => {
        initMap();
        map.invalidateSize();
        setMapPosition(l.latitude, l.longitude, 16);
      }, 100);
    }

    async function saveLocation() {
      const id = document.getElementById('loc-edit-id').value;
      const body = {
        name: document.getElementById('loc-name').value,
        address: document.getElementById('loc-address').value,
        latitude: parseFloat(document.getElementById('loc-lat').value),
        longitude: parseFloat(document.getElementById('loc-lng').value),
        radius_meters: parseInt(document.getElementById('loc-radius').value),
        hourly_rate: parseFloat(document.getElementById('loc-hourly').value),
        travel_allowance: parseFloat(document.getElementById('loc-travel').value),
        food_allowance: parseFloat(document.getElementById('loc-food').value),
        overtime_multiplier: parseFloat(document.getElementById('loc-multiplier').value),
        is_active: document.getElementById('loc-active').checked
      };
      const errEl = document.getElementById('loc-error');
      if (!body.name || isNaN(body.latitude) || isNaN(body.longitude)) { errEl.textContent='Ad, enlem ve boylam zorunlu'; errEl.style.display='block'; return; }

      let result;
      if (id) {
        result = await apiFetch('/api/admin/locations/'+id, { method:'PUT', body:JSON.stringify(body) });
      } else {
        result = await apiFetch('/api/admin/locations', { method:'POST', body:JSON.stringify(body) });
      }
      if (result && result.success) { closeLocModal(); loadLocations(); }
      else { errEl.textContent = result?.error||'Hata'; errEl.style.display='block'; }
    }

    async function showQR(id) {
      const data = await apiFetch('/api/admin/locations/'+id+'/qr-image');
      if (!data || !data.success) return;
      document.getElementById('qr-image').src = data.qr_base64;
      document.getElementById('qr-title').textContent = data.location_name + ' - QR Kod';
      document.getElementById('qr-label').textContent = data.location_name;
      document.getElementById('qr-modal').style.display = 'flex';
    }

    async function regenerateQR(id) {
      if (!confirm('QR kodu yenilenecek. Eski QR kod geçersiz olacak. Devam etmek istiyor musunuz?')) return;
      const result = await apiFetch('/api/admin/locations/'+id+'/regenerate-qr', { method:'POST' });
      if (result && result.success) { alert('QR kod yenilendi!'); loadLocations(); }
    }

    function printQR() {
      const img = document.getElementById('qr-image').src;
      const label = document.getElementById('qr-label').textContent;
      const w = window.open('','','width=500,height=600');
      w.document.write('<html><head><title>QR Kod - '+label+'</title>  <!-- DARK THEME CRITICAL OVERRIDES -->
  <style>
    html, body { background: #0d1117 !important; color: #e6edf3 !important; color-scheme: dark !important; }
    .app-layout, .main-content { background: #0d1117 !important; }
    .card, .card-body { background: #161b22 !important; }
    .card-header { background: #161b22 !important; border-bottom: 1px solid #30363d !important; }
    .card-header h3 { color: #e6edf3 !important; }
    thead th { background: #0d1117 !important; color: #8b949e !important; border-bottom: 1px solid #30363d !important; }
    tbody td { background: #161b22 !important; color: #e6edf3 !important; border-bottom: 1px solid #30363d !important; }
    tbody tr:hover td { background: #1f2937 !important; }
    input, select, textarea { background: #0d1117 !important; color: #e6edf3 !important; border: 1px solid #30363d !important; color-scheme: dark !important; }
    input:focus, select:focus { background: #161b22 !important; border-color: #f97316 !important; }
    option { background: #161b22 !important; color: #e6edf3 !important; }
    .stat-card { background: #161b22 !important; border: 1px solid #30363d !important; }
    .filter-bar input, .filter-bar select { background: #161b22 !important; color: #e6edf3 !important; }
    label { color: #8b949e !important; }
    ::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.6) !important; }
  </style></head><body style="text-align:center;padding:40px;font-family:Arial;"><h2>PDKS - '+label+'</h2><img src="'+img+'" style="max-width:400px;margin:20px;"><p>Bu QR kodu lokasyona yerleştirin</p></body></html>');
      w.document.close();
      w.print();
    }

    function closeLocModal() { document.getElementById('loc-modal').style.display='none'; }
    function closeQRModal() { document.getElementById('qr-modal').style.display='none'; }
    function logout() { localStorage.removeItem('pdks_admin_token'); localStorage.removeItem('pdks_admin_user'); window.location.href='login.html'; }

    loadLocations();
  </script>
</body>
</html>
